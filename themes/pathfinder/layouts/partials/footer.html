<footer class="site-footer">
  <div class="container footer-grid">
    <div>
      <p class="footer-heading">{{ site.Title }}</p>
      <p>{{ site.Params.tagline }}</p>
    </div>
    <div>
      <p class="footer-heading">Contact</p>
      <p><a href="tel:+18087284396">{{ site.Params.phone }}</a></p>
      <p><a href="mailto:{{ site.Params.email }}">{{ site.Params.email }}</a></p>
    </div>
    <div>
      <p class="footer-heading">Office</p>
      {{ range site.Params.address }}<p>{{ . }}</p>{{ end }}
    </div>
  </div>
</footer>
