<header class="site-header">
  <div class="container topbar">
    <a class="brand" href="{{ "/" | relURL }}" aria-label="{{ site.Title }} home">
      <img class="brand-mark" src="{{ "images/Pathfinder-Heading-Final.svg" | relURL }}" alt="{{ site.Title }}">
      <span class="brand-text">
        <span>{{ site.Params.tagline }}</span>
      </span>
    </a>
    <div class="header-actions">
      <div class="header-contact">
        <a href="tel:+18087284396">{{ site.Params.phone }}</a>
        <a href="mailto:{{ site.Params.email }}">{{ site.Params.email }}</a>
      </div>
      <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="site-menu" data-nav-toggle>
        <span></span>
        <span></span>
        <span></span>
        <span class="visually-hidden">Toggle navigation</span>
      </button>
    </div>
  </div>
  <div class="nav-wrap" id="site-menu" data-nav-panel>
    <div class="container">
      <nav class="site-nav" aria-label="Main navigation">
        {{ range site.Menus.main }}
          {{ if not .Parent }}
            <div class="nav-item{{ if or ($.IsMenuCurrent "main" .) ($.HasMenuCurrent "main" .) }} is-current{{ end }}">
              <a class="nav-link" href="{{ .URL }}"{{ if or ($.IsMenuCurrent "main" .) ($.HasMenuCurrent "main" .) }} aria-current="page"{{ end }}>{{ .Name }}</a>
            </div>
          {{ end }}
        {{ end }}
      </nav>
      <div class="mobile-contact">
        <a href="tel:+18087284396">{{ site.Params.phone }}</a>
        <a href="mailto:{{ site.Params.email }}">{{ site.Params.email }}</a>
      </div>
    </div>
  </div>
</header>
