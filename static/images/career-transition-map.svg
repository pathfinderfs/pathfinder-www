<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-label="A four-step decision map for a career change showing offer details, equity compensation, benefits, and cash flow leading into long-term planning.">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fffdf9"/>
      <stop offset="100%" stop-color="#f5efe4"/>
    </linearGradient>
    <linearGradient id="cardFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8f3e9"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a6f78"/>
      <stop offset="100%" stop-color="#0f4b57"/>
    </linearGradient>
    <linearGradient id="sand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eadcc8"/>
      <stop offset="100%" stop-color="#c08f4f"/>
    </linearGradient>
    <linearGradient id="seafoam" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d8ebe8"/>
      <stop offset="100%" stop-color="#4a7b76"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="170%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0f4b57" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerUnits="userSpaceOnUse" viewBox="0 0 18 18" refX="15" refY="9" markerWidth="18" markerHeight="18" orient="auto">
      <path d="M 0 0 L 18 9 L 0 18 z" fill="#166269"/>
    </marker>
  </defs>

  <rect x="24" y="24" width="1152" height="712" rx="34" fill="url(#bg)" stroke="#d7cab9" stroke-width="4"/>
  <path d="M 84 156 H 1116" stroke="#e3d7c6" stroke-width="2" stroke-dasharray="8 12"/>
  <circle cx="1046" cy="106" r="46" fill="#166269" fill-opacity="0.08"/>
  <circle cx="1088" cy="142" r="22" fill="#c08f4f" fill-opacity="0.18"/>

  <text x="70" y="90" font-family="Libre Baskerville, Georgia, serif" font-size="34" font-weight="700" fill="#1d313a">Career changes create a chain of decisions</text>
  <text x="70" y="124" font-family="Arial, sans-serif" font-size="18" fill="#546a73">Offer terms, equity, benefits, and cash flow work better when they are evaluated as one plan.</text>

  <g filter="url(#shadow)">
    <rect x="70" y="180" width="220" height="290" rx="28" fill="url(#cardFill)" stroke="#d7cab9" stroke-width="2"/>
    <rect x="350" y="180" width="220" height="290" rx="28" fill="url(#cardFill)" stroke="#d7cab9" stroke-width="2"/>
    <rect x="630" y="180" width="220" height="290" rx="28" fill="url(#cardFill)" stroke="#d7cab9" stroke-width="2"/>
    <rect x="910" y="180" width="220" height="290" rx="28" fill="url(#cardFill)" stroke="#d7cab9" stroke-width="2"/>
  </g>

  <g>
    <path d="M 290 325 H 350" stroke="#166269" stroke-width="10" stroke-linecap="round" marker-end="url(#arrow)"/>
    <path d="M 570 325 H 630" stroke="#166269" stroke-width="10" stroke-linecap="round" marker-end="url(#arrow)"/>
    <path d="M 850 325 H 910" stroke="#166269" stroke-width="10" stroke-linecap="round" marker-end="url(#arrow)"/>
  </g>

  <g>
    <circle cx="180" cy="234" r="28" fill="url(#teal)"/>
    <text x="180" y="241" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#ffffff">1</text>
    <text x="180" y="290" text-anchor="middle" font-family="Libre Baskerville, Georgia, serif" font-size="22" font-weight="700" fill="#1d313a">Offer</text>
    <text x="180" y="331" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#546a73">
      <tspan x="180" dy="0">Salary / bonus</tspan>
      <tspan x="180" dy="24">Start date / pace</tspan>
    </text>
  </g>

  <g>
    <circle cx="460" cy="234" r="28" fill="url(#sand)"/>
    <text x="460" y="241" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#ffffff">2</text>
    <text x="460" y="290" text-anchor="middle" font-family="Libre Baskerville, Georgia, serif" font-size="22" font-weight="700" fill="#1d313a">Equity</text>
    <text x="460" y="331" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#546a73">
      <tspan x="460" dy="0">RSUs / ISOs / NSOs</tspan>
      <tspan x="460" dy="24">Vesting / tax timing</tspan>
    </text>
  </g>

  <g>
    <circle cx="740" cy="234" r="28" fill="url(#seafoam)"/>
    <text x="740" y="241" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#ffffff">3</text>
    <text x="740" y="290" text-anchor="middle" font-family="Libre Baskerville, Georgia, serif" font-size="22" font-weight="700" fill="#1d313a">Benefits</text>
    <text x="740" y="331" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#546a73">
      <tspan x="740" dy="0">401(k) / pension</tspan>
      <tspan x="740" dy="24">HSA / insurance</tspan>
    </text>
  </g>

  <g>
    <circle cx="1020" cy="234" r="28" fill="url(#teal)"/>
    <text x="1020" y="241" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#ffffff">4</text>
    <text x="1020" y="290" text-anchor="middle" font-family="Libre Baskerville, Georgia, serif" font-size="22" font-weight="700" fill="#1d313a">Cash flow</text>
    <text x="1020" y="331" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#546a73">
      <tspan x="1020" dy="0">Reserves / estimates</tspan>
      <tspan x="1020" dy="24">Owner compensation</tspan>
    </text>
  </g>

  <g filter="url(#shadow)">
    <rect x="110" y="540" width="980" height="126" rx="28" fill="url(#cardFill)" stroke="#d7cab9" stroke-width="2"/>
  </g>

  <path d="M 170 603 H 1030" stroke="#d7cab9" stroke-width="2"/>
  <text x="600" y="586" text-anchor="middle" font-family="Libre Baskerville, Georgia, serif" font-size="24" font-weight="700" fill="#1d313a">The next move should still work after taxes and time.</text>
  <text x="600" y="622" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#546a73">A disciplined plan keeps the new role, the old accounts, and the future balance sheet pointed in the same direction.</text>
</svg>
