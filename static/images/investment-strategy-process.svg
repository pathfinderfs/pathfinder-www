<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-label="Pathfinder investment framework from goals to portfolio monitoring">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fffdf9"/>
      <stop offset="100%" stop-color="#f5efe4"/>
    </linearGradient>
    <linearGradient id="cardFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f9f4ea"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a6f78"/>
      <stop offset="100%" stop-color="#0f4b57"/>
    </linearGradient>
    <linearGradient id="sand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eadcc8"/>
      <stop offset="100%" stop-color="#c08f4f"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0f4b57" flood-opacity="0.12"/>
    </filter>
    <marker id="arrowTeal" markerUnits="userSpaceOnUse" viewBox="0 0 18 18" refX="16" refY="9" markerWidth="18" markerHeight="18" orient="auto">
      <path d="M 0 0 L 18 9 L 0 18 z" fill="#166269"/>
    </marker>
  </defs>

  <rect x="24" y="24" width="1152" height="672" rx="34" fill="url(#bg)" stroke="#d7cab9" stroke-width="4"/>
  <path d="M 88 156 H 1112" stroke="#e3d7c6" stroke-width="2" stroke-dasharray="8 12"/>

  <text x="72" y="94" font-family="Libre Baskerville, Georgia, serif" font-size="34" font-weight="700" fill="#1d313a">How Pathfinder invests</text>
  <text x="72" y="126" font-family="Arial, sans-serif" font-size="18" fill="#546a73">Start with goals, build efficiently, then adjust risk to fit the real world.</text>

  <g filter="url(#shadow)">
    <rect x="60" y="180" width="220" height="360" rx="28" fill="url(#cardFill)" stroke="#d7cab9" stroke-width="2"/>
    <rect x="340" y="180" width="220" height="360" rx="28" fill="url(#cardFill)" stroke="#d7cab9" stroke-width="2"/>
    <rect x="620" y="180" width="220" height="360" rx="28" fill="url(#cardFill)" stroke="#d7cab9" stroke-width="2"/>
    <rect x="900" y="180" width="220" height="360" rx="28" fill="url(#cardFill)" stroke="#d7cab9" stroke-width="2"/>
  </g>

  <g>
    <path d="M 280 360 H 340" stroke="#166269" stroke-width="10" stroke-linecap="round" marker-end="url(#arrowTeal)"/>
    <path d="M 560 360 H 620" stroke="#166269" stroke-width="10" stroke-linecap="round" marker-end="url(#arrowTeal)"/>
    <path d="M 840 360 H 900" stroke="#166269" stroke-width="10" stroke-linecap="round" marker-end="url(#arrowTeal)"/>
  </g>

  <g>
    <circle cx="170" cy="228" r="28" fill="url(#teal)"/>
    <text x="170" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#ffffff">1</text>
    <text x="170" y="287" text-anchor="middle" font-family="Libre Baskerville, Georgia, serif" font-size="22" font-weight="700" fill="#1d313a">Goals</text>
    <text x="170" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#546a73">
      <tspan x="170" dy="0">Time frame</tspan>
      <tspan x="170" dy="24">Spending floor</tspan>
    </text>
  </g>

  <g>
    <circle cx="450" cy="228" r="28" fill="url(#sand)"/>
    <text x="450" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#ffffff">2</text>
    <text x="450" y="287" text-anchor="middle" font-family="Libre Baskerville, Georgia, serif" font-size="22" font-weight="700" fill="#1d313a">Efficient base</text>
    <text x="450" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#546a73">
      <tspan x="450" dy="0">Low cost</tspan>
      <tspan x="450" dy="24">Broad diversification</tspan>
    </text>
  </g>

  <g>
    <circle cx="730" cy="228" r="28" fill="url(#teal)"/>
    <text x="730" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#ffffff">3</text>
    <text x="730" y="287" text-anchor="middle" font-family="Libre Baskerville, Georgia, serif" font-size="22" font-weight="700" fill="#1d313a">Targeted tilts</text>
    <text x="730" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#546a73">
      <tspan x="730" dy="0">Value</tspan>
      <tspan x="730" dy="24">Small-company exposure</tspan>
    </text>
  </g>

  <g>
    <circle cx="1010" cy="228" r="28" fill="url(#sand)"/>
    <text x="1010" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#ffffff">4</text>
    <text x="1010" y="287" text-anchor="middle" font-family="Libre Baskerville, Georgia, serif" font-size="22" font-weight="700" fill="#1d313a">Scenario test</text>
    <text x="1010" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#546a73">
      <tspan x="1010" dy="0">Downside matters</tspan>
      <tspan x="1010" dy="24">Avoid unacceptable losses</tspan>
    </text>
  </g>

  <path d="M 162 590 H 1038" stroke="#e3d7c6" stroke-width="2"/>
  <text x="600" y="626" text-anchor="middle" font-family="Libre Baskerville, Georgia, serif" font-size="22" font-weight="700" fill="#1d313a">Risk is set by the outcome you can accept, not by guesswork.</text>
</svg>
