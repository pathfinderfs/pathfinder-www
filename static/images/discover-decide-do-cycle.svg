<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 860" role="img" aria-label="Discover to Decide to Do cycle">
  <defs>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f4b57" flood-opacity="0.14"/>
    </filter>
    <marker id="head-discover" markerUnits="userSpaceOnUse" viewBox="0 0 20 20" refX="17.5" refY="10" markerWidth="20" markerHeight="20" orient="auto">
      <path d="M 0 0 L 20 10 L 0 20 z" fill="#146a74"/>
    </marker>
    <marker id="head-decide" markerUnits="userSpaceOnUse" viewBox="0 0 20 20" refX="17.5" refY="10" markerWidth="20" markerHeight="20" orient="auto">
      <path d="M 0 0 L 20 10 L 0 20 z" fill="#b97a34"/>
    </marker>
    <marker id="head-do" markerUnits="userSpaceOnUse" viewBox="0 0 20 20" refX="17.5" refY="10" markerWidth="20" markerHeight="20" orient="auto">
      <path d="M 0 0 L 20 10 L 0 20 z" fill="#2b8fa2"/>
    </marker>
  </defs>

  <circle cx="430" cy="430" r="342" fill="#f8f4ec" stroke="#d9cab8" stroke-width="4"/>
  <circle cx="430" cy="430" r="274" fill="#ffffff" filter="url(#soft-shadow)"/>
  <circle cx="430" cy="430" r="250" fill="none" stroke="#e8dfd2" stroke-width="10"/>

  <g fill="none" stroke-width="34" stroke-linecap="round">
    <path d="M 248 230 A 250 250 0 0 1 606 248" stroke="#146a74" marker-end="url(#head-discover)"/>
    <path d="M 640 340 A 250 250 0 0 1 476 650" stroke="#b97a34" marker-end="url(#head-decide)"/>
    <path d="M 350 668 A 250 250 0 0 1 204 372" stroke="#2b8fa2" marker-end="url(#head-do)"/>
  </g>

  <g font-family="Libre Baskerville, Georgia, serif" fill="#1d313a">
    <text x="430" y="250" text-anchor="middle" font-size="62" font-weight="700">Discover</text>
    <text x="616" y="556" text-anchor="middle" font-size="62" font-weight="700">Decide</text>
    <text x="244" y="556" text-anchor="middle" font-size="62" font-weight="700">Do</text>
  </g>
</svg>
