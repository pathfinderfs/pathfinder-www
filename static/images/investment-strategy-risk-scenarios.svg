<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-label="A comparison chart showing how more aggressive portfolio mixes can improve upside while lowering the spending floor">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fffdf9"/>
      <stop offset="100%" stop-color="#f5efe4"/>
    </linearGradient>
    <linearGradient id="barSafe" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d8ebe8"/>
      <stop offset="100%" stop-color="#166269"/>
    </linearGradient>
    <linearGradient id="barAggressive" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#eadcc8"/>
      <stop offset="100%" stop-color="#0f4b57"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0f4b57" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect x="24" y="24" width="1152" height="712" rx="34" fill="url(#bg)" stroke="#d7cab9" stroke-width="4"/>

  <text x="72" y="94" font-family="Libre Baskerville, Georgia, serif" font-size="34" font-weight="700" fill="#1d313a">Why downside matters</text>
  <text x="72" y="126" font-family="Arial, sans-serif" font-size="18" fill="#546a73">A better-looking return is not better if the spending floor is too low.</text>

  <text x="72" y="168" font-family="Arial, sans-serif" font-size="15" letter-spacing="0.08em" text-transform="uppercase" fill="#546a73">Illustrative annual spending range</text>

  <rect x="150" y="470" width="910" height="140" rx="18" fill="#f7dcd6" opacity="0.7"/>
  <line x1="150" y1="470" x2="1060" y2="470" stroke="#c95d52" stroke-width="3" stroke-dasharray="10 10"/>
  <text x="1068" y="476" font-family="Arial, sans-serif" font-size="15" fill="#9f4a40">Unacceptable floor</text>

  <g font-family="Arial, sans-serif" font-size="18" fill="#546a73">
    <line x1="150" y1="190" x2="1060" y2="190" stroke="#e6dbcb"/>
    <line x1="150" y1="260" x2="1060" y2="260" stroke="#e6dbcb"/>
    <line x1="150" y1="330" x2="1060" y2="330" stroke="#e6dbcb"/>
    <line x1="150" y1="400" x2="1060" y2="400" stroke="#e6dbcb"/>
    <line x1="150" y1="470" x2="1060" y2="470" stroke="#e6dbcb"/>
    <line x1="150" y1="540" x2="1060" y2="540" stroke="#e6dbcb"/>
    <line x1="150" y1="610" x2="1060" y2="610" stroke="#e6dbcb"/>

    <text x="120" y="196" text-anchor="end">120K</text>
    <text x="120" y="266" text-anchor="end">110K</text>
    <text x="120" y="336" text-anchor="end">100K</text>
    <text x="120" y="406" text-anchor="end">90K</text>
    <text x="120" y="476" text-anchor="end">80K</text>
    <text x="120" y="546" text-anchor="end">70K</text>
    <text x="120" y="616" text-anchor="end">60K</text>
  </g>

  <text x="48" y="490" transform="rotate(-90 48 490)" font-family="Arial, sans-serif" font-size="18" fill="#546a73">Annual retirement spending</text>

  <g filter="url(#shadow)">
    <rect x="370" y="330" width="180" height="70" rx="24" fill="url(#barSafe)" stroke="#166269" stroke-width="2"/>
    <rect x="770" y="260" width="180" height="280" rx="24" fill="url(#barAggressive)" stroke="#0f4b57" stroke-width="2"/>
  </g>

  <g>
    <circle cx="460" cy="330" r="11" fill="#ffffff" stroke="#166269" stroke-width="3"/>
    <circle cx="460" cy="400" r="11" fill="#166269"/>

    <circle cx="860" cy="260" r="11" fill="#ffffff" stroke="#0f4b57" stroke-width="3"/>
    <circle cx="860" cy="540" r="11" fill="#c95d52" stroke="#ffffff" stroke-width="3"/>
  </g>

  <g font-family="Libre Baskerville, Georgia, serif" fill="#1d313a">
    <text x="460" y="300" text-anchor="middle" font-size="24" font-weight="700">50/50</text>
    <text x="460" y="438" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#546a73">Higher floor</text>
    <text x="460" y="462" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#546a73">Expected: 100K</text>
    <text x="460" y="408" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#546a73">Floor: 90K</text>

    <text x="860" y="230" text-anchor="middle" font-size="24" font-weight="700">70/30</text>
    <text x="860" y="588" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#546a73">Lower floor</text>
    <text x="860" y="612" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#546a73">Expected: 110K</text>
    <text x="860" y="556" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#9f4a40">Floor: 70K</text>
  </g>

  <text x="600" y="688" text-anchor="middle" font-family="Libre Baskerville, Georgia, serif" font-size="22" font-weight="700" fill="#1d313a">More upside can be useful only if the downside floor stays acceptable.</text>
</svg>
